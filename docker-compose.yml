services:
  api:
    build:
      context: .
      dockerfile: XRayne.Api/Dockerfile
    image: xrayne-api:local
    container_name: xrayne-api
    env_file:
      - path: .env
        required: false
    environment:
      ASPNETCORE_URLS: ${ASPNETCORE_URLS:-http://+:8080}
      ConnectionStrings__Default: Host=postgres;Port=5432;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres};Database=${POSTGRES_DB:-xrayne}
      Xray__Directory: ${XRAYNE_XRAY_DIRECTORY:-/app/shared}
    ports:
      - "${XRAYNE_API_PORT:-8080}:8080"
    volumes:
      - ./data/api/logs:/app/logs
      - ./data/api/shared:/app/shared
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: xrayne-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xrayne}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-xrayne}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
