name: Build CLI

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: Publish ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            archive-name: xrayne-cli-win-x64
            archive-path: artifacts/xrayne-cli-win-x64.zip
            executable: xrayne.exe
          - os: macos-latest
            rid: osx-arm64
            archive-name: xrayne-cli-osx-arm64
            archive-path: artifacts/xrayne-cli-osx-arm64.tar.gz
            executable: xrayne

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore XRayne.Cli/XRayne.Cli.csproj -r ${{ matrix.rid }}

      - name: Publish
        run: >
          dotnet publish XRayne.Cli/XRayne.Cli.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishTrimmed=false
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o artifacts/${{ matrix.archive-name }}

      - name: Make macOS executable
        if: runner.os == 'macOS'
        run: chmod +x artifacts/${{ matrix.archive-name }}/${{ matrix.executable }}

      - name: Archive Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path artifacts/${{ matrix.archive-name }}/* -DestinationPath artifacts/${{ matrix.archive-name }}.zip

      - name: Archive macOS artifact
        if: runner.os == 'macOS'
        run: tar -czf artifacts/${{ matrix.archive-name }}.tar.gz -C artifacts/${{ matrix.archive-name }} .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive-name }}
          path: ${{ matrix.archive-path }}

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive-path }}
          prerelease: ${{ startsWith(github.ref_name, 'v') && (contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta')) }}
