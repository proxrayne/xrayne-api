name: Build release artifacts

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag, for example v0.0.1-beta-3"
        required: true
        type: string

env:
  RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

permissions:
  contents: write
  packages: write

jobs:
  publish-api-image:
    name: Publish API image tar.gz
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: image
        shell: bash
        run: |
          raw_version="${RELEASE_VERSION:-manual}"
          version="$(echo "$raw_version" | tr '/+' '--' | tr -c 'A-Za-z0-9_.-' '-')"
          version="${version#-}"
          version="${version%-}"
          if [ -z "$version" ]; then
            version="manual"
          fi
          echo "image=xrayne-api-image-${version}" >> "$GITHUB_OUTPUT"
          echo "archive=xrayne-api-image-${version}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image with UI
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Api/Dockerfile
          tags: ${{ steps.image.outputs.image }}
          outputs: type=docker,dest=/tmp/${{ steps.image.outputs.image }}.tar
          build-args: |
            VITE_API_DOMAIN=

      - name: Compress image
        shell: bash
        run: |
          mkdir -p artifacts
          gzip -c /tmp/${{ steps.image.outputs.image }}.tar > artifacts/${{ steps.image.outputs.archive }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: xrayne-api-image
          path: artifacts/${{ steps.image.outputs.archive }}

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          repository: VanyaKrotov/xrayne
          tag_name: ${{ env.RELEASE_VERSION }}
          target_commitish: main
          files: artifacts/${{ steps.image.outputs.archive }}
          prerelease: ${{ startsWith(env.RELEASE_VERSION, 'v') && (contains(env.RELEASE_VERSION, '-alpha') || contains(env.RELEASE_VERSION, '-beta')) }}
          token: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
